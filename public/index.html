<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shorts Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand">
            <span class="brand-badge">SS</span>
            <div class="brand-copy">
              <span class="brand-name">Shorts Studio</span>
              <span class="brand-subline">Control</span>
            </div>
          </div>
          <button id="sidebar-toggle-button" type="button" class="sidebar-toggle" aria-expanded="true" title="Colapsar barra">
            <span class="sidebar-toggle-icon"><<</span>
          </button>
        </div>

        <nav class="sidebar-nav">
          <button
            type="button"
            class="nav-tab active"
            data-view="scraped"
            data-tooltip="Perfiles scrapeados"
            aria-label="Perfiles scrapeados"
          >
            <span class="nav-tab-icon">SC</span>
            <span class="nav-tab-label">Perfiles scrapeados</span>
          </button>
          <button
            type="button"
            class="nav-tab"
            data-view="youtube"
            data-tooltip="Perfiles YouTube"
            aria-label="Perfiles YouTube"
          >
            <span class="nav-tab-icon">YT</span>
            <span class="nav-tab-label">Perfiles YouTube</span>
          </button>
          <button
            type="button"
            class="nav-tab"
            data-view="queue"
            data-tooltip="Cola"
            aria-label="Cola"
          >
            <span class="nav-tab-icon">CL</span>
            <span class="nav-tab-label">Cola</span>
          </button>
          <button
            type="button"
            class="nav-tab"
            data-view="overview"
            data-tooltip="Resumen"
            aria-label="Resumen"
          >
            <span class="nav-tab-icon">RS</span>
            <span class="nav-tab-label">Resumen</span>
          </button>
        </nav>
      </aside>

      <div id="sidebar-drawer-backdrop" class="sidebar-drawer-backdrop hidden"></div>

      <main class="workspace-shell">
        <header class="workspace-topbar">
          <div class="topbar-main">
            <button id="sidebar-mobile-button" type="button" class="topbar-menu-button" aria-expanded="false" aria-controls="sidebar">
              Menu
            </button>
            <div class="topbar-copy">
              <span id="header-eyebrow" class="topbar-label">Perfiles</span>
              <h1 id="page-title">Perfiles scrapeados</h1>
            </div>
          </div>
        </header>

        <section class="view-section active" data-view="scraped">
          <div class="view-stack">
            <section class="panel scan-toolbar-panel">
              <form id="track-form" class="scan-toolbar">
                <input id="username" name="username" type="text" placeholder="@usuario, #tema o URL" required />
                <button id="submit-button" type="submit">Escanear</button>
                <button id="refresh-button" type="button" class="ghost-button">Reescanear actual</button>
              </form>
            </section>

            <div class="workspace-grid workspace-grid-context scraped-grid">
              <aside class="panel context-panel scraped-context-panel">
                <div class="panel-head">
                  <div>
                    <span class="panel-label">TikTok</span>
                    <h2>Perfiles scrapeados</h2>
                  </div>
                  <button id="refresh-scraped-button" type="button" class="ghost-button">Actualizar</button>
                </div>

                <div id="scraped-profiles-list" class="context-list"></div>

                <div class="panel-pager">
                  <span id="scraped-profiles-pager-label" class="pager-label">Pagina 1</span>
                  <div class="pager-controls">
                    <button id="scraped-profiles-prev-page" type="button" class="ghost-button">Anterior</button>
                    <button id="scraped-profiles-next-page" type="button" class="ghost-button">Siguiente</button>
                  </div>
                </div>
              </aside>

              <section class="panel workspace-panel scraped-workspace-panel">
                <div id="scraped-profile-header" class="workspace-header"></div>

                <div class="selection-bar">
                  <div class="selection-copy">
                    <strong>Videos</strong>
                    <span id="scraped-results-meta">Sin perfil activo.</span>
                  </div>
                  <div class="selection-actions">
                    <button id="save-library-button" type="button" class="ghost-button" disabled>Guardar en biblioteca</button>
                  </div>
                </div>

                <div id="scraped-videos-grid" class="media-grid"></div>

                <div class="panel-pager">
                  <span id="scraped-videos-pager-label" class="pager-label">Pagina 1</span>
                  <div class="pager-controls">
                    <button id="scraped-videos-prev-page" type="button" class="ghost-button">Anterior</button>
                    <button id="scraped-videos-next-page" type="button" class="ghost-button">Siguiente</button>
                    <button id="load-more-media-button" type="button" class="ghost-button hidden">Traer mas</button>
                  </div>
                </div>
              </section>
            </div>
          </div>
        </section>

        <section class="view-section" data-view="youtube">
          <div class="view-stack youtube-view-stack">
            <section class="panel youtube-channel-strip">
              <div class="youtube-channel-strip-head">
                <div>
                  <span class="panel-label">YouTube</span>
                  <h2>Canales conectados</h2>
                </div>
                <div class="youtube-channel-strip-actions">
                  <button id="refresh-accounts-button" type="button" class="ghost-button">Actualizar</button>
                  <a id="add-youtube-account-button" class="button-link" href="/api/youtube/oauth/start">Agregar cuenta</a>
                </div>
              </div>

              <div id="youtube-profiles-list" class="youtube-channel-list"></div>

              <div class="panel-pager youtube-channel-strip-footer">
                <span id="youtube-profiles-pager-label" class="pager-label">Pagina 1</span>
                <div class="pager-controls">
                  <button id="youtube-profiles-prev-page" type="button" class="ghost-button">Anterior</button>
                  <button id="youtube-profiles-next-page" type="button" class="ghost-button">Siguiente</button>
                </div>
              </div>
            </section>

            <section class="panel workspace-panel youtube-workspace-panel">
              <div id="youtube-profile-header" class="workspace-header"></div>

              <div class="profile-tab-bar" id="youtube-profile-tab-bar">
                <button type="button" class="profile-tab active" data-tab="videos">Videos</button>
                <button type="button" class="profile-tab" data-tab="stats">Estadisticas</button>
                <button type="button" class="profile-tab" data-tab="publish">Publicar</button>
                <button type="button" class="profile-tab" data-tab="clone">Clonar</button>
              </div>

              <div id="youtube-profile-tab-content" class="profile-tab-content"></div>
            </section>
          </div>
        </section>

        <section class="view-section" data-view="queue">
          <section class="panel workspace-panel queue-workspace-panel">
            <div class="panel-head">
              <div>
                <span class="panel-label">Publicaciones</span>
                <h2>Cola general</h2>
              </div>
              <button id="refresh-publications-button" type="button" class="ghost-button">Actualizar</button>
            </div>

            <div id="queue-summary-strip" class="summary-strip compact"></div>

            <div class="queue-tab-bar" id="queue-tab-bar">
              <button type="button" class="queue-tab active" data-queue-tab="all">Todo</button>
              <button type="button" class="queue-tab" data-queue-tab="active">Pendientes</button>
              <button type="button" class="queue-tab" data-queue-tab="publishing">Publicando</button>
              <button type="button" class="queue-tab" data-queue-tab="scheduled">Programados</button>
              <button type="button" class="queue-tab" data-queue-tab="failed">Fallidos</button>
              <button type="button" class="queue-tab" data-queue-tab="published">Publicados</button>
            </div>

            <div id="publication-list" class="queue-list"></div>

            <div class="panel-pager">
              <span id="queue-pager-label" class="pager-label">Pagina 1</span>
              <div class="pager-controls">
                <button id="queue-prev-page" type="button" class="ghost-button">Anterior</button>
                <button id="queue-next-page" type="button" class="ghost-button">Siguiente</button>
              </div>
            </div>
          </section>
        </section>

        <section class="view-section" data-view="overview">
          <section class="panel workspace-panel overview-workspace-panel">
            <div class="panel-head">
              <div>
                <span class="panel-label">Monitoreo</span>
                <h2>Resumen general</h2>
              </div>
            </div>

            <div id="summary-strip" class="summary-strip"></div>

            <div class="overview-columns">
              <section class="subpanel">
                <div class="subpanel-head">
                  <strong>Perfiles recientes</strong>
                </div>
                <div id="overview-scraped-list" class="stack-list"></div>
              </section>

              <section class="subpanel">
                <div class="subpanel-head">
                  <strong>Actividad reciente</strong>
                </div>
                <div id="overview-publications-list" class="stack-list"></div>
              </section>
            </div>
          </section>
        </section>
      </main>
    </div>

    <div id="global-status" class="status-toast hidden" aria-live="polite"></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
